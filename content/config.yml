# Pane: Story
our_story_text: >-
  Downpours usually make for bad dates. But when we found each other during the 
  rainiest California winter of our lifetimes, we discovered so many shared passions in Berkeley, 
  that beating heart of the East Bay. We binged prestige TV; cooked from the Times's recipe catalogue; 
  played Scrabble, Hanabi, and Furnace in board game cafes. When the skies cleared, we saw the sunset from 
  the heights of Cragmont, watched the fog shroud the San Francisco skyline from Indian Rock, and listened 
  to the placid waves lapping the marina shoreline. We feasted on Berkeley's culinary delights 
  and drank in acres of botanical garden beauty. We write together. Our love runs deep after three years - and 
  yet, we still find as much joy in these little activities as we did the first time we tried them together.

# Pane: Families / Engagement
engagement_title: "Our Engagement"
engagement_text: >-
  Our families gathered this year for a fun Indian engagement. In a traditional
  ceremony, the families of the bride and groom exchange vows of commitment,
  marking the start of the wedding festivities. Aditi and I exchanged rings,
  drank kheer, and were showered with rice and gifts.

