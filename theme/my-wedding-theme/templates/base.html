<!doctype html>
<html lang="{{ DEFAULT_LANG }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ SITENAME }}{% endblock title %}</title>
  <link rel="icon" type="image/png" href="{{ SITEURL }}/images/logo/monogram.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{{ SITEURL }}/theme/css/main.css" />
  {% block head_extra %}{% endblock head_extra %}
</head>
<body class="{% block body_class %}{% endblock body_class %}">
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <main>
    {% block content %}{% endblock content %}
  </main>

  <footer class="site-footer">
    <p>{{ SITENAME }}</p>
    <div class="footer-links" aria-label="Site links">
      {% for page in pages|sort(attribute='title') %}
      {% if page.slug != 'home' %}
      <a href="{{ SITEURL }}/{{ page.url }}">{{ page.title }}</a>
      {% endif %}
      {% endfor %}
    </div>
  </footer>

  {% block scripts %}{% endblock scripts %}
</body>
</html>
